name: Release

on:
  push:
    tags: ["v*"]
  # Tag pushes build the full exe (dictation bundled).  Manual runs can opt into
  # a fast, lean exe (no Whisper/Torch) for quick checks.
  workflow_dispatch:
    inputs:
      build_pyz:
        description: "Also build the Windows star.pyz fat zipapp (not built on tag pushes)"
        type: boolean
        default: false
      build_exe:
        description: "Also build the DEPRECATED self-contained Windows star.exe (manual fallback only)"
        type: boolean
        default: false
      lean:
        description: "If building the deprecated exe, make it LEAN (skip the Whisper + Torch dictation stack) — fast/small"
        type: boolean
        default: false

# The release job creates a GitHub Release and uploads the built artifacts.
permissions:
  contents: write

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONUTF8: "1"

jobs:
  # ── Universal wheel + sdist ────────────────────────────────────────────────
  # star is pure Python, so the wheel is `py3-none-any` and one build serves
  # every platform.  twine check guards the long-description rendering ahead of
  # the eventual PyPI publish (roadmap item 2).
  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*

  # ── Windows fat zipapp (star.pyz) — manual opt-in only ─────────────────────
  # The wheel (above) is the only automated release artifact.  The .pyz is NOT
  # built on tag pushes and is NOT attached to the GitHub Release; users who want
  # one build it themselves with `python build_zipapp.py` (see docs/installation.md).
  # Build it here only via a manual workflow_dispatch run with `build_pyz: true`.
  #
  # build_zipapp.py installs the [all] extras into a staging tree and runs its
  # own smoke test (imports PyQt6 + PyMuPDF from the extraction cache).  The .pyz
  # is platform-specific because it carries compiled extensions, so it is built
  # per-OS.
  windows-pyz:
    name: Build Windows star.pyz (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.build_pyz
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build star.pyz
        run: python build_zipapp.py
      - name: Stamp platform into the filename
        shell: bash
        run: mv dist/star.pyz dist/star-windows-x64.pyz
      - uses: actions/upload-artifact@v4
        with:
          name: pyz-windows
          path: dist/star-windows-x64.pyz

  # ── Windows self-contained binary (star.exe) — DEPRECATED manual fallback ───
  # The wheel (above) is the primary, stable artifact.  The PyInstaller star.exe
  # is retained only as a manual fallback: it is NOT built on tag pushes and is
  # NOT attached to the GitHub Release.  Build it only via a manual
  # workflow_dispatch run with `build_exe: true` (optionally `lean: true`).
  #
  # tools/build-windows.ps1 creates an isolated venv, installs the runtime deps,
  # stages the offline NLTK data, and runs PyInstaller.  It also requires the
  # explicit -AllowDeprecatedExe opt-in (passed below).
  #
  # Note: this produces an exe WITHOUT the vendored native tools (ffmpeg,
  # Tesseract, liblouis, Pandoc, DECtalk).  To ship a fully self-contained exe,
  # run `python tools/build-vendor.py` before the build step (needs 7-Zip on
  # PATH) — see docs/RELEASING.md.
  windows-exe:
    name: Build Windows star.exe (deprecated)
    if: github.event_name == 'workflow_dispatch' && inputs.build_exe
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build star.exe (deprecated manual fallback)
        shell: pwsh
        run: |
          if ('${{ inputs.lean }}' -eq 'true') {
            Write-Host 'Building LEAN star.exe (no Torch/Whisper)'
            ./tools/build-windows.ps1 -Lean -AllowDeprecatedExe
          } else {
            Write-Host 'Building full star.exe with offline dictation (Torch/Whisper)'
            ./tools/build-windows.ps1 -AllowDeprecatedExe
          }
      - uses: actions/upload-artifact@v4
        with:
          name: exe-windows
          path: dist/star.exe

  # ── Publish to TestPyPI (pre-release tags: vX.Y.Z-rcN) ─────────────────────
  # Uses PyPI trusted publishing (OIDC) — no API token is stored.  The repo must
  # be registered as a trusted publisher for the project and a `testpypi`
  # environment configured; see docs/RELEASING.md.  Skipped on manual runs.
  #
  # Gated on the `ENABLE_PYPI` repo variable so publishing stays OFF until the
  # trusted publisher is active: set Settings → Variables → ENABLE_PYPI=true to
  # turn it on.  Until then the build + GitHub Release still run.
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [wheel]
    if: vars.ENABLE_PYPI == 'true' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish to PyPI (final tags: vX.Y.Z) ───────────────────────────────────
  # Also gated on ENABLE_PYPI (see TestPyPI job above).
  publish-pypi:
    name: Publish to PyPI
    needs: [wheel]
    if: vars.ENABLE_PYPI == 'true' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  # ── Publish the GitHub Release ─────────────────────────────────────────────
  # The automated release is wheel + sdist only (published to PyPI above and
  # attached here).  Neither the star.pyz nor the deprecated star.exe is a
  # dependency or attached to releases — build those manually if you need them
  # (see windows-pyz / windows-exe above and docs/installation.md).
  release:
    name: Publish GitHub Release
    needs: [wheel]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List collected artifacts
        run: ls -R artifacts
      - name: Create / update the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
