name: Release

on:
  push:
    tags: ["v*"]
  # Tag pushes build the full exe (dictation bundled).  Manual runs can opt into
  # a fast, lean exe (no Whisper/Torch) for quick checks.
  workflow_dispatch:
    inputs:
      build_pyz:
        description: "Also build the Windows star.pyz fat zipapp (not built on tag pushes)"
        type: boolean
        default: false
      build_exe:
        description: "Force-build the self-contained Windows star.exe on a manual run (it already builds on every v* tag)"
        type: boolean
        default: false
      lean:
        description: "Build the exe LEAN (skip the Whisper + Torch dictation stack) — fast/small"
        type: boolean
        default: false
      build_installers:
        description: "Also build the OPTIONAL native installers (Windows NSIS, macOS .app/DMG, Linux AppImage). Signing/notarization only happens when the matching secrets are configured; otherwise the artifacts build unsigned."
        type: boolean
        default: false

# The release job creates a GitHub Release and uploads the built artifacts.
permissions:
  contents: write

env:
  QT_QPA_PLATFORM: offscreen
  PYTHONUTF8: "1"

jobs:
  # ── Universal wheel + sdist ────────────────────────────────────────────────
  # star is pure Python, so the wheel is `py3-none-any` and one build serves
  # every platform.  twine check guards the long-description rendering ahead of
  # the eventual PyPI publish (roadmap item 2).
  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*

  # ── Windows fat zipapp (star.pyz) — manual opt-in only ─────────────────────
  # The wheel (above) is the only automated release artifact.  The .pyz is NOT
  # built on tag pushes and is NOT attached to the GitHub Release; users who want
  # one build it themselves with `python build_zipapp.py` (see docs/installation.md).
  # Build it here only via a manual workflow_dispatch run with `build_pyz: true`.
  #
  # build_zipapp.py installs the [all] extras into a staging tree and runs its
  # own smoke test (imports PyQt6 + PyMuPDF from the extraction cache).  The .pyz
  # is platform-specific because it carries compiled extensions, so it is built
  # per-OS.
  windows-pyz:
    name: Build Windows star.pyz (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.build_pyz
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build star.pyz
        run: python build_zipapp.py
      - name: Stamp platform into the filename
        shell: bash
        run: mv dist/star.pyz dist/star-windows-x64.pyz
      - uses: actions/upload-artifact@v4
        with:
          name: pyz-windows
          path: dist/star-windows-x64.pyz

  # ── Self-contained Windows star.exe ────────────────────────────────────────
  # A single double-click .exe with Python, PyQt6, every document loader, the
  # offline dictation stack (Whisper + Torch), and the vendored native tools
  # (ffmpeg / tesseract / liblouis / pandoc / espeak-ng) baked in — for the many
  # students who can't install Python or its dependencies.  Built on every `v*`
  # tag and attached to the GitHub Release.  DECtalk is deliberately EXCLUDED
  # from this public artifact (--no-dectalk): it's a commercial synthesizer from
  # a community mirror, unfit for public redistribution.  A manual run can pass
  # `lean: true` for a fast, small exe without the Whisper/Torch stack.
  windows-exe:
    name: Windows star.exe (self-contained)
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_exe) ||
      vars.ENABLE_INSTALLERS == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Fetch vendored native tools (no DECtalk)
        shell: pwsh
        run: python tools/build-vendor.py --no-dectalk
      - name: Build star.exe
        shell: pwsh
        env:
          STAR_ALLOW_EXE: "1"   # opt in to the big self-contained build
        run: |
          if ('${{ inputs.lean }}' -eq 'true') {
            Write-Host 'Building LEAN star.exe (no Torch/Whisper)'
            ./tools/build-windows.ps1 -Lean -Ocr
          } else {
            Write-Host 'Building full star.exe with offline dictation (Torch/Whisper)'
            ./tools/build-windows.ps1 -Ocr
          }
      - name: Version-stamp the artifact
        shell: pwsh
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          Move-Item dist/star.exe "dist/star-$ver-windows-x64.exe"
          Get-ChildItem dist/*.exe | ForEach-Object { "{0}  {1:N0} MB" -f $_.Name, ($_.Length/1MB) }
      - uses: actions/upload-artifact@v4
        with:
          name: exe-windows
          path: dist/star-*-windows-x64.exe
          if-no-files-found: error

  # ── Publish to TestPyPI (pre-release tags: vX.Y.Z-rcN) ─────────────────────
  # Uses PyPI trusted publishing (OIDC) — no API token is stored.  The repo must
  # be registered as a trusted publisher for the project and a `testpypi`
  # environment configured; see docs/RELEASING.md.  Skipped on manual runs.
  #
  # Gated on the `ENABLE_PYPI` repo variable so publishing stays OFF until the
  # trusted publisher is active: set Settings → Variables → ENABLE_PYPI=true to
  # turn it on.  Until then the build + GitHub Release still run.
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [wheel]
    if: vars.ENABLE_PYPI == 'true' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish to PyPI (final tags: vX.Y.Z) ───────────────────────────────────
  # Also gated on ENABLE_PYPI (see TestPyPI job above).
  publish-pypi:
    name: Publish to PyPI
    needs: [wheel]
    if: vars.ENABLE_PYPI == 'true' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  # ── OPTIONAL: GPG-sign the wheel + sdist ───────────────────────────────────
  # Produces detached ``.asc`` signatures for every artifact in ``dist/`` so
  # users can verify authenticity (``gpg --verify star_reader-X.whl.asc``).
  #
  # GATING: this job runs ONLY when the ``GPG_PRIVATE_KEY`` secret is present.
  # It is expressed as a job-level ``if:`` on ``vars.ENABLE_GPG_SIGNING`` so the
  # job is *skipped* (not failed) on any repo that has not opted in — the
  # existing wheel/PyPI/release pipeline is never blocked.  To enable:
  #   1. Add secrets ``GPG_PRIVATE_KEY`` (ASCII-armored private key) and
  #      ``GPG_PASSPHRASE``.
  #   2. Set repo variable ``ENABLE_GPG_SIGNING=true``.
  # See docs/PACKAGING.md → "GPG signing".
  sign-artifacts:
    name: GPG-sign wheel + sdist (optional)
    needs: [wheel]
    if: vars.ENABLE_GPG_SIGNING == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "::notice::GPG_PRIVATE_KEY empty — skipping signing (no-op)."
            exit 0
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
      - name: Sign each artifact (detached .asc)
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          shopt -s nullglob
          for f in dist/*.whl dist/*.tar.gz; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${GPG_PASSPHRASE}" \
                --armor --detach-sign "$f"
          done
          ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: dist/*.asc
          if-no-files-found: ignore

  # ── OPTIONAL: Windows NSIS installer (+ Authenticode signing) ──────────────
  # Builds a click-through ``star-setup.exe`` from the fat zipapp.  Authenticode
  # signing runs only when a code-signing cert is supplied.
  #
  # GATING: runs on a manual ``workflow_dispatch`` with ``build_installers:
  # true`` (so a normal tag push never pays for it), OR when the repo opts in via
  # ``vars.ENABLE_INSTALLERS=true``.  Authenticode signing inside is a further
  # no-op when ``WINDOWS_CERT_PFX_BASE64`` is absent — the unsigned installer is
  # still produced.  Maintainer secrets to enable signing:
  #   ``WINDOWS_CERT_PFX_BASE64`` (base64 of a .pfx) + ``WINDOWS_CERT_PASSWORD``.
  # See docs/PACKAGING.md → "Windows installer".
  windows-installer:
    name: Windows NSIS installer (optional)
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.build_installers) ||
      vars.ENABLE_INSTALLERS == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build star.pyz (installer payload)
        run: python build_zipapp.py
      - name: Install NSIS
        run: choco install nsis --no-progress -y
      - name: Build + (optionally) sign the installer
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: ./tools/build-nsis.ps1 -Payload dist/star.pyz -OutDir dist
      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/star-setup*.exe
          if-no-files-found: ignore

  # ── macOS .app / DMG (+ codesign & notarize) ───────────────────────────────
  # Builds a double-clickable ``star.app`` and a ``.dmg`` with PyInstaller via
  # the shared star.spec (darwin → ONEDIR .app bundle).  Speech comes from the OS
  # (NSSpeechSynthesizer via pyttsx3 + the /usr/bin/say backend), so no vendored
  # binaries are bundled.  Developer-ID codesign + notarization run only when an
  # Apple Developer ID cert + notary credentials are supplied; otherwise the .app
  # is AD-HOC signed (runs after the user clears Gatekeeper quarantine).
  #
  # RUNNER: macos-latest is Apple Silicon, so this produces an arm64-only .app
  # (stamped ``…-macos-arm64``).  Intel Macs would need a separate x86_64 runner.
  #
  # GATING: builds on every ``v*`` tag — a DEFAULT release artifact, attached to
  # the GitHub Release — plus the manual ``build_installers`` /
  # ``vars.ENABLE_INSTALLERS`` triggers.  Signing/notarization is a no-op when
  # ``MACOS_CERTIFICATE_BASE64`` is absent (ad-hoc .app/.dmg still produced).
  # Maintainer secrets to enable Developer-ID signing + notarization:
  #   ``MACOS_CERTIFICATE_BASE64`` (base64 .p12) + ``MACOS_CERTIFICATE_PASSWORD``,
  #   ``MACOS_NOTARY_APPLE_ID`` + ``MACOS_NOTARY_PASSWORD`` + ``MACOS_NOTARY_TEAM_ID``.
  # Offline dictation (faster-whisper / CTranslate2, ~140 MB) is bundled by
  # default now; set ``STAR_MACOS_LEAN=1`` in the job env for a small build.
  # See docs/PACKAGING.md → "macOS app / DMG".
  macos-app:
    name: macOS .app / DMG
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_installers) ||
      vars.ENABLE_INSTALLERS == 'true'
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build + (optionally) sign/notarize the .app/.dmg
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: bash tools/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: app-macos
          path: |
            dist/*.dmg
            dist/*.app.zip
          if-no-files-found: error

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  # Bundles a Python runtime + star into a single self-contained ``star.AppImage``
  # that runs on most Linux distros with no install step.  No signing needed
  # (AppImages are typically distributed with a GPG .asc from the sign job above).
  #
  # GATING: builds on every ``v*`` tag — a DEFAULT release artifact since
  # 0.1.22, attached to the GitHub Release — plus the manual
  # ``build_installers`` / ``vars.ENABLE_INSTALLERS`` triggers shared with the
  # other installers.  See docs/PACKAGING.md → "Linux AppImage" (which also
  # documents the local one-command Docker build).
  linux-appimage:
    name: Linux AppImage
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_installers) ||
      vars.ENABLE_INSTALLERS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build the AppImage
        run: bash tools/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: appimage-linux
          path: dist/*.AppImage
          if-no-files-found: ignore

  # ── Publish the GitHub Release ─────────────────────────────────────────────
  # The automated release is wheel + sdist + the Linux AppImage + the
  # self-contained Windows star.exe + the macOS .app/DMG.  The star.pyz is not
  # attached (build it manually — see windows-pyz above and docs/installation.md).
  #
  # ``linux-appimage``, ``windows-exe`` and ``macos-app`` are in ``needs`` so
  # their artifacts are finished before the sweep-up below (without it a slow
  # build races this job and its artifact silently misses the release).  The exe
  # is the long pole (~30-60 min for the Torch + PyInstaller build), so the
  # Release appears once it finishes; PyPI publishing (needs: [wheel] only) is
  # NOT delayed by it.  ``if: always()`` + the explicit wheel check keeps the
  # release from being held hostage — a failed exe, AppImage or .app build still
  # publishes wheel + sdist + whatever else succeeded.  Best-effort signing /
  # installer jobs stay out of ``needs``; their artifacts are still swept up by
  # ``download-artifact@v4`` (it downloads *every* uploaded artifact).
  release:
    name: Publish GitHub Release
    needs: [wheel, linux-appimage, windows-exe, macos-app]
    if: always() && needs.wheel.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List collected artifacts
        run: ls -R artifacts
      - name: Create / update the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
