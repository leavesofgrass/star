name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a force-push doesn't pile up jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI runners have no display.  Qt's offscreen platform plugin lets any widget
  # code (and the offscreen GUI smoke tests) run headlessly.  Harmless on
  # Windows/macOS, required on Linux.
  QT_QPA_PLATFORM: offscreen
  # Keep stdout UTF-8 everywhere so the --deps report (and any Unicode in test
  # output) never trips the Windows cp1252 console.
  PYTHONUTF8: "1"

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }}${{ matrix.extras && ', extras' || '' }})
    runs-on: ${{ matrix.os }}
    # The suite runs in ~1-3 min; a wedged xdist worker (see
    # faulthandler_timeout in pyproject) must fail fast, not burn the
    # runner's 6-hour default.  The extras leg installs Torch, so give
    # setup generous headroom.
    # Room for tools/ci-pytest.sh's wall-clock retry: up to 3 × the 480 s cap
    # (~24 min) plus install, so a transient teardown hang is killed + retried
    # to green rather than eating the timeout as a "cancelled" leg.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # star is pure-Python and cross-platform.  The matrix covers the min and
      # max supported Python on every OS, fills in 3.12 on the cheap Linux
      # runner, and runs one Linux leg with the optional packages installed so
      # the "real behaviour" tests run instead of only the skip paths.
      matrix:
        include:
          - { os: ubuntu-latest,  python: "3.11" }
          - { os: ubuntu-latest,  python: "3.12" }
          - { os: ubuntu-latest,  python: "3.13", extras: true }
          - { os: ubuntu-latest,  python: "3.14" }
          - { os: windows-latest, python: "3.11" }
          - { os: windows-latest, python: "3.13" }
          - { os: macos-latest,   python: "3.13" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Cache the pip download cache (keyed on pyproject.toml) so the slow
          # legs — chiefly windows-latest 3.11 installing PyQt6 — reuse wheels
          # instead of re-downloading every run.
          cache: pip

      - name: Install Qt + media runtime libraries (Linux)
        if: runner.os == 'Linux'
        # ffmpeg + espeak-ng let the karaoke-video smoke test actually run (it
        # needs ffmpeg to mux and a TTS engine to synthesize) instead of being
        # skipped, so it guards the headless-render crash fixed in video.py.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            ffmpeg espeak-ng

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        # Windows is the platform where headless Qt video export crashed; SAPI5
        # already provides TTS, so ffmpeg is all the smoke test needs to run here
        # and catch any regression of the QGuiApplication fix.
        run: choco install ffmpeg -y --no-progress

      - name: Install star (with test extra)
        run: python -m pip install -e ".[test]"

      - name: Install pure-Python optional features (extras leg)
        if: matrix.extras
        # These extras have no native build step, so they install cleanly on any
        # runner and unlock the real-behaviour tests for translation, feeds, the
        # difficult-word overlay, summarisation, flashcards, and spell check.
        run: >
          python -m pip install
          deep-translator feedparser wordfreq sumy genanki pyspellchecker

      - name: Run the test suite
        shell: bash
        run: bash tools/ci-pytest.sh python -m pytest

  full-fat:
    name: full-fat (all optional deps, py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 45  # room for the ci-pytest.sh wall-clock retry (see test job)
    # Installs the entire optional-dependency surface (`.[all,test]`) so the
    # real-behaviour branches of every feature run instead of their skip paths —
    # this is the integration-regression net.  The base `test` matrix legs run
    # fast on the recommended profile; this one leg trades speed for depth.  Any
    # cross-feature breakage (a loader that depends on odfpy/openpyxl/pypandoc, a
    # graph/NER path, the difficult-word overlay, the interactive Qt GUI tests)
    # surfaces here.  pytest-qt + hypothesis ship in the `test` extra already;
    # they are the drivers for tests/test_gui_*.py and tests/test_loaders_property.py.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Qt + media runtime libraries
        # libegl/libgl/xkbcommon/dbus/xcb-cursor let offscreen Qt widgets (and the
        # pytest-qt GUI tests) load; ffmpeg + espeak-ng let the karaoke-video and
        # any TTS-backed smoke tests actually execute rather than skip.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            ffmpeg espeak-ng pandoc

      - name: Install star with ALL optional deps + test tooling
        # `.[all,test]` pulls the full extras matrix plus pytest / pytest-cov /
        # pytest-qt / hypothesis.  The `all` extra is pure-Python + native wheels
        # that install cleanly on the Linux runner.
        run: python -m pip install -e ".[all,test]"

      - name: Install extras that live outside the `all` group
        # spaCy NER and deep-translator/feeds/wordfreq/etc. unlock the remaining
        # real-behaviour tests; the spaCy language model is fetched so the NER
        # path runs instead of falling back to the regex extractor.
        run: |
          python -m pip install \
            deep-translator feedparser wordfreq spacy nltk
          python -m spacy download en_core_web_sm || true

      - name: Run the full suite (all deps present)
        shell: bash
        run: bash tools/ci-pytest.sh python -m pytest

  coverage:
    name: coverage gate (per-module floors)
    runs-on: ubuntu-latest
    timeout-minutes: 45  # room for the ci-pytest.sh wall-clock retry (see test job)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install star (with test extra)
        run: python -m pip install -e ".[test]"

      - name: Enforce per-module coverage floors
        # One suite run collects coverage for the gated modules; each floor below
        # is a ratchet — raise it as the module gains tests.  Both have direct
        # tests: tests/test_tts.py (tts.py ~31% on CI) and tests/test_documents.py
        # (documents.py ~40%; the test file alone deterministically covers ~32%).
        # coverage's --fail-under is global, so per-module floors are enforced by
        # separate `coverage report --include=... --fail-under` checks against the
        # single collected data file.
        shell: bash
        run: |
          bash tools/ci-pytest.sh python -m pytest --cov=star.tts --cov=star.documents --cov=star.render --cov=star.citations --cov=star.obsidian --cov=star.graph --cov=star.markup --cov=star.ttstext --cov=star.dictionary --cov=star.autodeps --cov=star.library --cov=star.export --cov=star.gui.preferences --cov-report=term-missing
          python -m coverage report --include="*/tts/*.py" --fail-under=30
          python -m coverage report --include="*/documents/*.py" --fail-under=32
          python -m coverage report --include="*/render.py" --fail-under=70
          python -m coverage report --include="*/citations.py" --fail-under=70
          python -m coverage report --include="*/obsidian.py" --fail-under=78
          python -m coverage report --include="*/graph.py" --fail-under=88
          python -m coverage report --include="*/markup/*.py" --fail-under=66
          python -m coverage report --include="*/ttstext/*.py" --fail-under=92
          python -m coverage report --include="*/dictionary.py" --fail-under=70
          python -m coverage report --include="*/autodeps.py" --fail-under=83
          python -m coverage report --include="*/library.py" --fail-under=88
          # export.py's HTML/EPUB exporters route through Pandoc; without the
          # optional Pandoc stack (the CI base install) those paths don't run, so
          # the achievable floor is the Markdown-exporter path (~59%).
          python -m coverage report --include="*/export.py" --fail-under=55
          # First star.gui module under the gate: the Preferences dialog's
          # apply-hooks are its fragile core and tests/test_preferences.py
          # alone deterministically covers ~88% (offscreen QPA; PyQt6 is a
          # core dependency, so this job always runs the GUI tests).
          python -m coverage report --include="*/gui/preferences.py" --fail-under=85

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    # Blocking as of 0.1.14: the codebase is ruff-clean (F4/F8/E7 etc.), so this
    # gate now keeps it that way — a new unused import or ambiguous name fails CI.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        # PINNED ON PURPOSE.  This gate is blocking, and an unpinned ruff means
        # an upstream release can turn CI red with no code change: ruff 0.16.0
        # broadened its *implicit default* rule set, which would have failed
        # this job with ~965 findings the project never opted into.  The rule
        # set is now named explicitly in pyproject.toml ([tool.ruff.lint]
        # select), and the version is pinned here so the gate is reproducible.
        #
        # To bump: raise the pin, run `ruff check .` locally, and deal with
        # whatever the new version reports *deliberately* — either fix it or
        # adjust select/ignore in pyproject.toml.  Do not float this.
        run: python -m pip install ruff==0.16.0

      - name: Lint
        # ruff honours .gitignore, so the vendored/build/venv trees are skipped.
        run: ruff check .
